<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard FIVE STAR 2</title>
    
    <meta name="theme-color" content="#007AFF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    
    <script>
        (function() {
            function applyTheme() {
                const savedTheme = localStorage.getItem('app-theme');
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isDark = savedTheme === 'dark' || (!savedTheme && systemDark);
                document.documentElement.classList.toggle('dark-theme', isDark);
                if (document.body) { document.body.classList.toggle('dark-theme', isDark); }
            }
            applyTheme();
            window.addEventListener('DOMContentLoaded', applyTheme);
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                if (!localStorage.getItem('app-theme')) applyTheme();
            });
        })();
    </script>
</head>
<body>
    <div class="app-container">
        <header style="padding: 20px 20px 10px 20px;">
            <div class="profile-info" style="display: flex; align-items: center; gap: 15px;"> 
                <a href="#" onclick="bukaPopupProfil(event)" class="profile-pic-wrapper" 
                   style="width: 100px; height: 100px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: var(--card-bg); display: flex; align-items: center; justify-content: center; border: 2px solid rgba(0,122,255,0.1);">
                    <img src="" alt="Profile" class="profile-pic" style="width: 100%; height: 100%; object-fit: cover;">
                </a>
                <div class="user-text-wrapper" style="display: flex; flex-direction: column; justify-content: center;">
                    <h1 class="user-name" id="displayNamaLengkap" style="font-size: 20px; font-weight: 700; margin: 0; line-height: 1.2;">Memuat...</h1>
                    <span class="user-handle" id="displayUsername" style="font-size: 14px; color: #8E8E93; margin-top: 2px;">@username</span>
                </div>
            </div>
        </header>

        <div class="datetime-container" style="text-align: center; margin-top: 10px; margin-bottom: -20px;">
            <span id="jam-sekarang" style="font-size: 38px; font-weight: 800; color: var(--text-primary); letter-spacing: -1.5px; display: block; line-height: 1;">00:00:00</span>
            <span id="tanggal-sekarang" style="font-size: 13px; color: #007AFF; font-weight: 700; margin-top: 8px; display: block; text-transform: uppercase; letter-spacing: 1px;">Memuat Tanggal...</span>
        </div>

        <main class="grid-menu" style="margin-top: 40px; padding: 0 20px 30px 20px;">
            <a href="#" class="menu-card" onclick="bukaMenuKerja(event)">
                <i class="fa-solid fa-briefcase icon icon-kerja"></i>
                <span class="menu-title">Kerja</span>
            </a>
            <a href="#" class="menu-card" onclick="bukaKalenderAbsen(event)">
                <i class="fa-solid fa-list-check icon icon-absensi"></i>
                <span class="menu-title">Absen</span>
            </a>
            <a href="#" class="menu-card" onclick="bukaMenuKasbon(event)">
                <i class="fa-solid fa-money-bill-wave icon icon-kasbon"></i>
                <span class="menu-title">Kasbon</span>
            </a>
            <a href="#" class="menu-card" onclick="bukaMenuRincian(event)">
                <i class="fa-solid fa-file-invoice icon icon-rincian"></i>
                <span class="menu-title">Rincian</span>
            </a>
            <a href="#" class="menu-card" onclick="bukaMenuGaji(event)">
                <i class="fa-solid fa-sack-dollar icon icon-gaji"></i>
                <span class="menu-title">Gaji</span>
            </a>
            <a href="#" class="menu-card" onclick="bukaMenuEdit(event)">
                <i class="fa-solid fa-user-pen icon icon-edit"></i>
                <span class="menu-title">Edit Data</span>
            </a>
        </main>
    </div>
        
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

    
    <script src="js/core/firebase.js"></script>
    <script src="js/core/main.js"></script>
    
    <script src="js/user/profil.js"></script>
    <script src="js/user/pengaturan.js"></script>
    <script src="js/features/absen.js"></script>
    <script src="js/features/kalender-absen.js"></script>
    <script src="js/features/kerja.js"></script>
    <script src="js/features/kasbon.js"></script>
    <script src="js/features/rincian.js"></script>
    <script src="js/features/gaji.js"></script>
    <script src="js/features/edit-data.js"></script>

    <script>
    window.antrianAbsenBolong = [];

    // --- 1. SECURITY GUARD ---
    firebase.auth().onAuthStateChanged(async function(user) {
        if (user) {
            console.log("Sesi Aktif: " + user.email);
            if (typeof refreshDataProfilUI === 'function') refreshDataProfilUI();
            await jalankanPolisiAbsen(user);
        } else {
            window.location.href = "login.html"; 
        }
    });

    // --- 2. PATROLI POLISI ABSEN ---
    async function jalankanPolisiAbsen(user) {
        const tglDaftar = new Date(user.metadata.creationTime);
        tglDaftar.setHours(0, 0, 0, 0);

        console.log("Polisi Absen: Memulai patroli...");
        const listPromises = [];
        const daftarTglLengkap = [];
        const opsi = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };

        // Diubah menjadi i >= 1 agar tidak menagih absen "Hari Ini" saat baru buka aplikasi pagi hari
        for (let i = 7; i >= 1; i--) {
            let d = new Date();
            d.setDate(d.getDate() - i);
            d.setHours(0, 0, 0, 0);

            if (d < tglDaftar) continue;

            const tglFullStr = d.toLocaleDateString('id-ID', opsi); 
            const temp = tglFullStr.split(', ');
            const parts = temp[1].split(" ");
            
            const blnTahunId = parts[1] + "_" + parts[2]; 
            const dateId = tglFullStr.replace(', ', '_').replace(/\s/g, '_'); 

            daftarTglLengkap.push(tglFullStr);

            const p = window.firestore.collection('data').doc(user.uid)
                        .collection('absen').doc(blnTahunId)
                        .collection(dateId).doc('harian').get();
            listPromises.push(p);
        }

        if (listPromises.length === 0) return;

        try {
            const snapshots = await Promise.all(listPromises);
            window.antrianAbsenBolong = [];

            snapshots.forEach((doc, index) => {
                if (!doc.exists) { 
                    window.antrianAbsenBolong.push(daftarTglLengkap[index]); 
                }
            });

            if (window.antrianAbsenBolong.length > 0) {
                panggilModalAntrean();
            }
        } catch (e) { console.error("Polisi Gagal Patroli:", e); }
    }

    function panggilModalAntrean() {
        if (window.antrianAbsenBolong.length > 0) {
            const tglTarget = window.antrianAbsenBolong[0];
            if (typeof window.bukaMenuAbsen === 'function') {
                window.bukaMenuAbsen(null, tglTarget, null, true); 
            }
        }
    }

    function aturNantiSemua() {
        window.antrianAbsenBolong = []; 
        const modal = document.getElementById('absenModal'); 
        if (modal) modal.style.display = 'none'; 
        
        if (typeof IOSAlert !== 'undefined') {
            IOSAlert.show("Peringatan", "Absenmu masih ada yang bolong. Jangan lupa dilengkapi nanti ya!");
        }
    }

    // --- 3. REGISTER SERVICE WORKER (PWA) ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                // Pantau jika ada update
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            if (typeof IOSAlert !== 'undefined') {
                                IOSAlert.show("Update Tersedia", "Versi terbaru FIVE STAR 2 siap digunakan.", {
                                    teksTombol: "Segarkan",
                                    onConfirm: () => {
                                        if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                                    }
                                });
                            }
                        }
                    });
                });
            }).catch(err => console.log('PWA Error:', err));
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
                window.location.reload();
                refreshing = true;
            }
        });
    }
    </script>
</body>
</html>
